<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIIC ZONE - 3D Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --depth: 1000px;
            --wall-height: 400px;
            --color-primary: #8b5cf6;
            --color-secondary: #06b6d4;
        }

        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
            /* Prevent browser zooming/scrolling */
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .joystick-zone {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            margin: 20px;
            pointer-events: auto;
            position: relative;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* --- LANFOR (SHUTTER) --- */
        #lanfor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    #111,
                    #111 20px,
                    #000 21px);
            z-index: 200;
            transition: transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -50px 100px #000;
        }

        #lanfor.open {
            transform: translateY(-100%);
        }

        .btn-start {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 0 30px var(--color-primary);
            animation: pulse 1.5s infinite;
        }

        /* --- 3D ENGINE (CSS) --- */
        #viewport {
            perspective: 800px;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            overflow: hidden;
        }

        #world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            transform-origin: 50% 50%;
            /* transform set by JS */
        }

        .floor {
            position: absolute;
            width: 2000px;
            height: 2000px;
            background:
                linear-gradient(rgba(139, 92, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: translate(-50%, -50%) rotateX(90deg) translateZ(-100px);
            opacity: 0.6;
            backface-visibility: visible;
            /* Floor seen from above */
        }

        .wall {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            backface-visibility: double;
            /* See from both sides */
        }

        .poster {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .avatar-npc {
            position: absolute;
            width: 60px;
            height: 120px;
            background: var(--color-secondary);
            transform-style: preserve-3d;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--color-secondary);
        }

        /* Animations */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        #mindmap-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80%;
            background: rgba(10, 10, 15, 0.95);
            transform: translateY(110%);
            transition: transform 0.4s ease;
            z-index: 150;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mindmap-panel.visible {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <!-- SHUTTER -->
    <div id="lanfor">
        <h1 style="font-size: 3rem; margin-bottom: 0;">DIIC ZONE</h1>
        <p style="color: #666; letter-spacing: 5px; margin-bottom: 40px;">SECURE ACCESS</p>
        <button class="btn-start" onclick="enterStudio()">ENTRAR</button>
    </div>

    <!-- UI -->
    <div id="ui-layer">
        <div style="padding: 20px; text-align: center;">
            <div style="font-size: 0.8rem; opacity: 0.7;">DIIC ZONE V3.0</div>
            <div id="debug" style="font-family: monospace; color: #0f0;"></div>
        </div>

        <div id="controls">
            <!-- Left Stick: Move -->
            <div class="joystick-zone" id="stick-move">
                <div class="joystick-knob" id="knob-move"></div>
            </div>
            <!-- Right Stick: Look -->
            <div class="joystick-zone" id="stick-look">
                <div class="joystick-knob" id="knob-look"></div>
            </div>
        </div>

        <!-- Toggle Map Button -->
        <div style="position: absolute; bottom: 180px; right: 20px; text-align: center;">
            <button onclick="toggleMap()"
                style="background:none; border: 1px solid white; color: white; padding: 10px; border-radius: 50%; width: 50px; height: 50px;">🗺️</button>
        </div>
    </div>

    <!-- 3D WORLD -->
    <div id="viewport">
        <div id="world">
            <div class="floor"></div>

            <!-- Department: Community Manager -->
            <div class="wall" style="width: 200px; height: 300px; transform: translate3d(0, -100px, -400px)">
                <div class="poster">
                    <h3>Community<br>Manager</h3>
                    <p style="font-size: 0.8rem">Estrategia & Redes</p>
                </div>
            </div>

            <!-- Department: Edición -->
            <div class="wall"
                style="width: 200px; height: 300px; transform: translate3d(-300px, -100px, -200px) rotateY(45deg)">
                <div class="poster" style="border-color: var(--color-secondary)">
                    <h3>Edición<br>Video</h3>
                    <p style="font-size: 0.8rem">Reels & Clips</p>
                </div>
            </div>

            <!-- Department: Web -->
            <div class="wall"
                style="width: 200px; height: 300px; transform: translate3d(300px, -100px, -200px) rotateY(-45deg)">
                <div class="poster" style="border-color: #f472b6">
                    <h3>Desarrollo<br>Web</h3>
                    <p style="font-size: 0.8rem">SaaS & Landing</p>
                </div>
            </div>

            <!-- NPC / Bot -->
            <div class="avatar-npc" style="transform: translate3d(0, 50px, -200px)">
                <div style="position: absolute; top: -40px; width: 100%; text-align: center; font-size: 0.7rem;">
                    Asistente IA</div>
            </div>

        </div>
    </div>

    <!-- MIND MAP -->
    <div id="mindmap-panel" onclick="toggleMap()">
        <h2 style="color:white;">Vista Mapa Mental</h2>
    </div>

    <script>
        // State
        const state = {
            x: 0,
            z: 500, // Start back
            rotY: 0,
            speed: 5,
            rotSpeed: 2
        };

        const inputs = {
            moveX: 0,
            moveY: 0,
            lookX: 0
        };

        let isRunning = false;

        function enterStudio() {
            document.getElementById('lanfor').classList.add('open');
            isRunning = true;
            loop();
        }

        function toggleMap() {
            document.getElementById('mindmap-panel').classList.toggle('visible');
        }

        // Joystick Logic
        function setupJoystick(zoneId, knobId, inputKeyX, inputKeyY) {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            let startX, startY;

            zone.addEventListener('touchstart', e => {
                e.preventDefault();
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            });

            zone.addEventListener('touchmove', e => {
                e.preventDefault();
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;

                // Clamp
                const max = 40;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const clampedDist = Math.min(dist, max);
                const angle = Math.atan2(dy, dx);

                const finalX = Math.cos(angle) * clampedDist;
                const finalY = Math.sin(angle) * clampedDist;

                knob.style.transform = `translate(calc(-50% + ${finalX}px), calc(-50% + ${finalY}px))`;

                // Update inputs (-1 to 1)
                inputs[inputKeyX] = finalX / max;
                if (inputKeyY) inputs[inputKeyY] = finalY / max;
            });

            zone.addEventListener('touchend', () => {
                knob.style.transform = `translate(-50%, -50%)`;
                inputs[inputKeyX] = 0;
                if (inputKeyY) inputs[inputKeyY] = 0;
            });

            // Mouse fallback for desktop testing
            let isDragging = false;
            zone.addEventListener('mousedown', e => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
            });
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                const max = 40;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const clampedDist = Math.min(dist, max);
                const angle = Math.atan2(dy, dx);
                const finalX = Math.cos(angle) * clampedDist;
                const finalY = Math.sin(angle) * clampedDist;
                knob.style.transform = `translate(calc(-50% + ${finalX}px), calc(-50% + ${finalY}px))`;
                inputs[inputKeyX] = finalX / max;
                if (inputKeyY) inputs[inputKeyY] = finalY / max;
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    knob.style.transform = `translate(-50%, -50%)`;
                    inputs[inputKeyX] = 0;
                    if (inputKeyY) inputs[inputKeyY] = 0;
                }
            });
        }

        setupJoystick('stick-move', 'knob-move', 'moveX', 'moveY');
        setupJoystick('stick-look', 'knob-look', 'lookX', null);

        // Game Loop
        function loop() {
            if (!isRunning) return;

            // Rotation
            state.rotY -= inputs.lookX * state.rotSpeed;

            // Movement (Relative to rotation)
            const rad = state.rotY * Math.PI / 180;
            const fwd = inputs.moveY; // -1 is forward usually on screen Y is down, so negative
            const strafe = inputs.moveX;

            // Forward/Back
            state.z += Math.cos(rad) * fwd * state.speed;
            state.x -= Math.sin(rad) * fwd * state.speed;

            // Strafe
            state.z += Math.sin(rad) * strafe * state.speed;
            state.x += Math.cos(rad) * strafe * state.speed;

            updateView();
            requestAnimationFrame(loop);
        }

        function updateView() {
            const world = document.getElementById('world');
            // CSS 3D Camera Transform: We move the WORLD opposite to the camera
            // Translate center first, then rotate, then translate position
            world.style.transform = `
                translateZ(600px) 
                rotateY(${-state.rotY}deg) 
                translate3d(${-state.x}px, 0, ${-state.z}px)
            `;

            // Debug
            // document.getElementById('debug').innerText = `X:${Math.round(state.x)} Z:${Math.round(state.z)} R:${Math.round(state.rotY)}`;
        }

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIIC ZONE | Creative Studio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area text-gradient">
                <i data-lucide="zap"></i>
                DIIC ZONE
            </div>

            <nav class="nav-links">
                <a class="nav-item active" onclick="Router.navigate('dashboard')" id="nav-dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </a>
                <a class="nav-item" onclick="Router.navigate('projects')" id="nav-projects">
                    <i data-lucide="folder-kanban"></i>
                    Proyectos
                </a>
                <a class="nav-item" onclick="Router.navigate('calendar')" id="nav-calendar">
                    <i data-lucide="calendar"></i>
                    Calendario
                </a>
                <a class="nav-item" onclick="Router.navigate('team')" id="nav-team">
                    <i data-lucide="users"></i>
                    Equipo
                </a>
                <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <span class="text-muted" style="font-size: 0.75rem; padding-left: 1rem;">SETTINGS</span>
                    <a class="nav-item" onclick="Router.navigate('settings')" id="nav-settings">
                        <i data-lucide="settings"></i>
                        Configuración
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div>
                    <h2 id="page-title">Dashboard</h2>
                    <p class="text-muted" id="current-date">Sincronizando...</p>
                </div>

                <div class="flex gap-4 items-center">
                    <button class="btn btn-outline btn-sm">
                        <i data-lucide="bell"></i>
                    </button>
                    <div class="user-profile flex items-center gap-2">
                        <div
                            style="width: 32px; height: 32px; background: var(--color-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                            JS
                        </div>
                        <span style="font-size: 0.9rem;">Jefe Studio</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Route Content -->
            <div id="app-view" class="animate-fade-in">
                <!-- Content injected by script.js -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/views.js"></script>
    <script src="script.js"></script>
</body>

</html>
